databaseChangeLog:
  - changeSet:
      id: 005-add-google-identity-fields
      author: haris.naeem
      changes:
        - addColumn:
            tableName: api_user
            columns:
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  name: google_subject
                  type: VARCHAR(255)
        - addUniqueConstraint:
            tableName: api_user
            columnNames: email
            constraintName: uk_api_user_email

        - addUniqueConstraint:
            tableName: api_user
            columnNames: google_subject
            constraintName: uk_api_user_google_subject

        - dropNotNullConstraint:
            tableName: api_user
            columnName: password
            columnDataType: VARCHAR(255)

