databaseChangeLog:
  - changeSet:
      id: 003-create-api-user-table
      author: haris.naeem
      changes:
        - createTable:
            tableName: api_user
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_api_user
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(150)
                  constraints:
                    unique: true
                    uniqueConstraintName : uk_api_user_username
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

