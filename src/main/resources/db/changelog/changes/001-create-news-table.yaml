databaseChangeLog:
  - changeSet:
      id: 001-create-news-table
      author: haris.naeem
      changes:
        - createTable:
            tableName: news
            columns:
              - column:
                  name: news_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_news
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: details
                  type: VARCHAR(5000)
                  constraints:
                    nullable: false
              - column:
                  name: reported_by
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: reported_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
