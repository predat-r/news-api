databaseChangeLog:
  - changeSet:
      id: 005-add-api-user-token-fields
      author: haris.naeem
      changes:
        - addColumn:
            tableName: api_user
            columns:
              - column:
                  name: token
                  type: VARCHAR(64)
              - column:
                  name: token_expires_at
                  type: TIMESTAMP
        - addUniqueConstraint:
            tableName: api_user
            columnNames: token
            constraintName: uk_api_user_token